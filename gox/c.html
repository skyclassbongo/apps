<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bongoclass</title>
  <style>
      body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(to bottom, #000d3a, #00234a);
  color: white;
  text-align: center;
}

.container {
  padding: 20px;
}

.logo {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  margin-top: 40px;
}

h1 {
  font-size: 32px;
  margin: 20px 0 10px;
}

.subtitle {
  font-size: 16px;
  color: #cccccc;
  margin-bottom: 40px;
}

.download-section {
  background-color: #002a3a;
  border-radius: 10px;
  padding: 20px;
  margin: 20px auto;
  width: 90%;
  max-width: 400px;
}

.download-title {
  font-size: 18px;
  margin-bottom: 10px;
}

.download-button {
  display: inline-block;
  background-color: orange;
  color: white;
  padding: 12px 24px;
  font-weight: bold;
  text-decoration: none;
  border-radius: 5px;
}

.preview-title {
  font-size: 24px;
  margin-top: 40px;
}

.preview-image {
  margin-top: 10px;
  max-width: 100%;
  border-radius: 10px;
}

/* Floating WhatsApp Icon */
.whatsapp-float {
  position: fixed;
  bottom: 20px;
  right: 20px;
  z-index: 100;
}

.whatsapp-icon {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: white;
  padding: 5px;
  box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
}

  </style>
  <link rel="icon" type="image/png" href="image/icon.png">
</head>
<body>
  <div class="container">
    <img src="image/icon.png" alt="Mpenja TV Logo" class="logo">
    <h1>Bongoclass</h1>
    <p class="subtitle">Furahia Mpira na Tetesi za Soka</p>
    
    <div class="download-section">
      <p class="download-title">Download the App</p>
      <a href="" class="download-button">Download Now</a>
    </div>
<div class="download-section">
    <h2 class="preview-title">Preview</h2>
    <img src="image/1.png" alt="App Preview" class="preview-image">
    <img src="image/2.png" alt="App Preview" class="preview-image">
    <img src="image/3.png" alt="App Preview" class="preview-image">
  </div>
  </DIV>

  <!-- Floating WhatsApp Icon -->
  <a href="" class="whatsapp-float" target="_blank" title="Chat on WhatsApp">
    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp" class="whatsapp-icon">
  </a>
</body>
</html>
